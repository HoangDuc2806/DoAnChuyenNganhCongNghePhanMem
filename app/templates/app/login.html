{% extends 'app/base.html' %}
{% load static %}

{% block register %}
<style>
.auth-wrap{min-height:calc(100vh - 72px);display:flex;align-items:center;justify-content:center;padding:60px 20px;background:var(--paper);}
.auth-card{background:white;border:1px solid var(--border);border-radius:24px;padding:48px;width:100%;max-width:440px;box-shadow:0 16px 48px rgba(0,0,0,.06);}
.auth-input{width:100%;height:48px;padding:0 16px;border:1.5px solid var(--border);border-radius:12px;font-size:.92rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;margin-bottom:14px;}
.auth-input:focus{border-color:var(--gold);}
.auth-btn{width:100%;height:50px;background:var(--ink);color:white;border:none;border-radius:12px;font-size:.88rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:background .2s;}
.auth-btn:hover{background:var(--gold);}
.auth-label{font-size:.78rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block;}
</style>

<div class="auth-wrap">
    <div class="auth-card">
        <div style="text-align:center;margin-bottom:36px;">
            <h1 style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;">ĐĂNG NHẬP</h1>
            <p style="font-size:.85rem;color:var(--muted);margin-top:4px;">Chào mừng trở lại DLN Store</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div style="background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:12px 16px;font-size:.85rem;margin-bottom:16px;">⚠️ {{ message }}</div>
        {% endfor %}
        {% endif %}

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <label class="auth-label">Tên đăng nhập</label>
            <input class="auth-input" type="text" name="username" placeholder="Nhập tên đăng nhập" required>
            <label class="auth-label">Mật khẩu</label>
            <input class="auth-input" type="password" name="password" placeholder="Nhập mật khẩu" required>
            <button type="submit" class="auth-btn" style="margin-top:8px;">Đăng nhập →</button>
        </form>

        <p style="text-align:center;margin-top:24px;font-size:.85rem;color:var(--muted);">
            Chưa có tài khoản? <a href="{% url 'register' %}" style="color:var(--gold);font-weight:600;text-decoration:none;">Đăng ký ngay</a>
        </p>
    </div>
</div>
{% endblock %}
